name: Deploy Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'workflow/convert_zxu_to_json.py'
      - 'infra/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-divelogsite
  FUNCTION_APP_NAME: func-divelog
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Stage function package
        run: |
          mkdir -p ./.deploy/functions
          # Functions コード本体（function_app.py / host.json / requirements.txt 等）
          cp -r functions/. ./.deploy/functions/
          # convert_zxu_to_json.py をフラット配置で同梱
          # （function_app.py から `import convert_zxu_to_json` で参照可能にする）
          cp workflow/convert_zxu_to_json.py ./.deploy/functions/

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Flex Consumption では allowSharedKeyAccess: false のため、Kudu による ZIP
      # アップロード先ストレージの認証に呼び出し元 SP の Entra ID トークンを使用する。
      # SP に Storage Blob Data Contributor がない場合は 403 になる。
      # functionApp.bicep の条件付きロール割り当ては GITHUB_ACTIONS_PRINCIPAL_ID 未設定時は
      # スキップされるため、ここで冪等に付与する（既に割り当て済みの場合はエラーを無視）。
      - name: Ensure SP has Storage Blob Data Contributor (Flex Consumption デプロイ用)
        run: |
          SP_OBJECT_ID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv)
          STORAGE_ID=$(az storage account list \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "[0].id" -o tsv)
          az role assignment create \
            --assignee-object-id "$SP_OBJECT_ID" \
            --assignee-principal-type ServicePrincipal \
            --role "Storage Blob Data Contributor" \
            --scope "$STORAGE_ID" \
            --only-show-errors || true

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: ./.deploy/functions
          # Flex Consumption では Oryx によるリモートビルドで requirements.txt から依存解決する
          scm-do-build-during-deployment: true
          enable-oryx-build: true
          remote-build: true
