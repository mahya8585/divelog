name: Deploy Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'workflow/convert_zxu_to_json.py'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-divelogsite
  FUNCTION_APP_NAME: func-divelog
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Stage function package
        run: |
          mkdir -p ./.deploy/functions
          # Functions コード本体
          cp -r functions/. ./.deploy/functions/
          # workflow/convert_zxu_to_json.py を Functions パッケージに同梱
          # （Azure 上で workflow/ ディレクトリ全体を import 可能にする）
          mkdir -p ./.deploy/functions/workflow
          cp workflow/convert_zxu_to_json.py ./.deploy/functions/workflow/
          touch ./.deploy/functions/workflow/__init__.py

      - name: Install dependencies into package
        run: |
          if [ -f ./.deploy/functions/requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install \
              --target="./.deploy/functions/.python_packages/lib/site-packages" \
              -r ./.deploy/functions/requirements.txt
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: ./.deploy/functions
          scm-do-build-during-deployment: false
          enable-oryx-build: false
