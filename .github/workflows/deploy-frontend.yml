name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  # main 以外のブランチでも手動でフロントエンドだけ再公開できるようにする。
  # 例: VITE_API_BASE_URL のバンドル更新検証、SWA ホスト名変更直後の差分公開など。
  workflow_dispatch:

env:
  APP_LOCATION: frontend
  OUTPUT_LOCATION: dist

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        env:
          # SWA Linked Backend が /api/* を Container Apps にエッジ転送するため、
          # SPA は相対パス /api/* で動作する。VITE_API_BASE_URL の埋め込みは不要。
          #
          # CSP の connect-src に App Insights ingestion オリジンを動的に許可するために必要。
          # 未設定でもビルドは通る（その場合 ingestion へのテレメトリ送信が CSP で遮断される）。
          VITE_APPINSIGHTS_CONNECTION_STRING: ${{ secrets.VITE_APPINSIGHTS_CONNECTION_STRING }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.APP_LOCATION }}
          output_location: ${{ env.OUTPUT_LOCATION }}
