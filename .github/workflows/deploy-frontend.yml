name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'infra/**'
      - '.github/workflows/deploy-frontend.yml'
  # main 以外のブランチでも手動でフロントエンドだけ再公開できるようにする。
  # 例: VITE_API_BASE_URL のバンドル更新検証、SWA ホスト名変更直後の差分公開など。
  workflow_dispatch:

env:
  APP_LOCATION: frontend
  OUTPUT_LOCATION: dist

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    # secrets コンテキストは step の if 条件で直接参照できないため、
    # job レベルの env に一旦マップしてから step 内で参照する。
    env:
      _VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      # VITE_API_BASE_URL シークレットが設定されている場合のみ環境変数として展開する。
      # 未設定（空文字列）の場合は環境変数を渡さず、frontend/.env.production の値を Vite が使用する。
      # 空文字列を env: ブロックで渡すと Vite が .env.production の値を上書きして
      # BASE_URL="" のままビルドされ /api/login が SWA 自身に向かい 405 になるため。
      - name: Export VITE_API_BASE_URL (シークレットが設定されている場合のみ)
        if: ${{ env._VITE_API_BASE_URL != '' }}
        run: echo "VITE_API_BASE_URL=$_VITE_API_BASE_URL" >> $GITHUB_ENV

      - name: Set production API URL fallback
        if: ${{ env._VITE_API_BASE_URL == '' }}
        run: echo "VITE_API_BASE_URL=https://ca-divelog.proudpond-f152c32f.japanwest.azurecontainerapps.io" >> $GITHUB_ENV

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        env:
          # CSP の connect-src に App Insights ingestion オリジンを動的に許可するために必要。
          # 未設定でもビルドは通る（その場合 ingestion へのテレメトリ送信が CSP で遮断される）。
          VITE_APPINSIGHTS_CONNECTION_STRING: ${{ secrets.VITE_APPINSIGHTS_CONNECTION_STRING }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.APP_LOCATION }}
          output_location: ${{ env.OUTPUT_LOCATION }}
