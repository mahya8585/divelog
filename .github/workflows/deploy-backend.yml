name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'workflow/json/**'
      - '.github/workflows/deploy-backend.yml'
  # main 以外のブランチでも手動でバックエンドだけ再公開できるようにする。
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-divelogsite
  ACR_NAME: acrdivelog
  CONTAINER_APP_NAME: ca-divelog
  IMAGE_NAME: backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build image on ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --file backend/Dockerfile .

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # SECRET_KEY を Container App の secret として同期する。
      #   - backend/app.py は SECRET_KEY 未設定だと fail-start するため、本番では必須。
      #   - GitHub Secrets `SECRET_KEY` を一度設定すれば、以降の Bicep 再デプロイで secret が
      #     消えても本ステップで復元される。値は `python -c "import secrets; print(secrets.token_urlsafe(64))"`
      #     で生成した固定値を使用すること（値を変えると既存ログインセッションが全て失効する）。
      - name: Sync SECRET_KEY on Container App
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          set -e
          if [ -z "$SECRET_KEY" ]; then
            echo "WARN: GitHub Secrets SECRET_KEY が未設定です。Container App 既存の secret を維持します。"
            exit 0
          fi
          az containerapp secret set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --secrets "secret-key=$SECRET_KEY"
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --set-env-vars "SECRET_KEY=secretref:secret-key"

      # GPS 提案 LLM の secrets / 環境変数を更新（Bicep を再実行せず CI から差し替え可能にする）
      # 実行条件:
      #   - LLM_PROVIDER=openai          → secrets.OPENAI_API_KEY が必須
      #   - LLM_PROVIDER=azure_openai    → vars.AZURE_OPENAI_ENDPOINT が必須
      #     ・認証は常に Container App の UAMI（Cognitive Services OpenAI User ロール）を使用。
      #       API キー認証は意図的にサポートしない（リソース側で disableLocalAuth=true 強制）。
      - name: Update LLM secrets and env on Container App
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          GPS_DIFF_THRESHOLD_KM: ${{ vars.GPS_DIFF_THRESHOLD_KM }}
        run: |
          set -e
          PROVIDER="${LLM_PROVIDER:-openai}"

          if [ "$PROVIDER" = "openai" ] && [ -z "$OPENAI_API_KEY" ]; then
            echo "LLM_PROVIDER=openai だが OPENAI_API_KEY が未設定。LLM 環境変数の更新をスキップします。"
            exit 0
          fi
          if [ "$PROVIDER" = "azure_openai" ] && [ -z "$AZURE_OPENAI_ENDPOINT" ]; then
            echo "LLM_PROVIDER=azure_openai だが AZURE_OPENAI_ENDPOINT が未設定。LLM 環境変数の更新をスキップします。"
            exit 0
          fi

          SECRETS=()
          ENVS=("LLM_PROVIDER=$PROVIDER")

          if [ "$PROVIDER" = "openai" ]; then
            SECRETS+=("openai-api-key=$OPENAI_API_KEY")
            ENVS+=("OPENAI_API_KEY=secretref:openai-api-key")
          else
            ENVS+=("AZURE_OPENAI_ENDPOINT=$AZURE_OPENAI_ENDPOINT")
            [ -n "$AZURE_OPENAI_DEPLOYMENT" ] && ENVS+=("AZURE_OPENAI_DEPLOYMENT=$AZURE_OPENAI_DEPLOYMENT")
            ENVS+=("AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-10-21}")
            echo "Azure OpenAI は Managed Identity (UAMI) 経由で認証します。"
          fi

          ENVS+=("GPS_DIFF_THRESHOLD_KM=${GPS_DIFF_THRESHOLD_KM:-25}")

          if [ ${#SECRETS[@]} -gt 0 ]; then
            az containerapp secret set \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --secrets "${SECRETS[@]}"
          fi
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --set-env-vars "${ENVS[@]}"
